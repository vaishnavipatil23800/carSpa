# ── Server ──
spring.application.name=booking-service
server.port=8082

# ── Database ──
spring.datasource.url=jdbc:mysql://localhost:3306/bookingdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Eureka ──
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ── RabbitMQ ──
# spring.rabbitmq.host=localhost
# spring.rabbitmq.port=5672
# spring.rabbitmq.username=guest
# spring.rabbitmq.password=guest

# ── Caffeine Cache ──
# slot-availability cache expires after 30s — fast enough to be accurate
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=30s

# ── Slot conflict window (minutes) ──
# Two bookings within 30 min of each other at same location = conflict
booking.slot-window-minutes=30

# ── Swagger ──
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Logging ──
logging.level.com.carspa=INFO

# ── Actuator ──
management.endpoints.web.exposure.include=health,info

# Disable RabbitMQ if not installed (comment out to enable)
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration