# ── Server ──
spring.application.name=chat-service
server.port=8086

# ── Eureka ──
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ── Fix: prevent WebFlux from taking over the web context ──
# We include webflux only for WebClient, not for reactive HTTP handling
spring.main.web-application-type=servlet

# ── OpenAI ──
# Sign up at https://platform.openai.com/api-keys to get an API key
# Free tier has usage limits — sufficient for development/demo
openai.api-key=sk-REPLACE_WITH_YOUR_OPENAI_KEY
openai.api-url=https://api.openai.com/v1/chat/completions
openai.model=gpt-3.5-turbo
openai.max-tokens=600
openai.temperature=0.7

# ── Conversation history ──
# Number of past message pairs (user+assistant) to include in each request
# More = better context, more tokens used = higher API cost
chat.history-pairs=6

# ── Swagger ──
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Logging ──
logging.level.com.carspa=DEBUG
logging.level.org.springframework.web.reactive=WARN

# ── Actuator ──
management.endpoints.web.exposure.include=health,info
