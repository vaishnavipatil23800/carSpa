# \u2500\u2500 Server \u2500\u2500
spring.application.name=car-service
server.port=8083

# \u2500\u2500 Database \u2500\u2500
spring.datasource.url=jdbc:mysql://localhost:3306/cardb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# \u2500\u2500 Eureka \u2500\u2500
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# \u2500\u2500 Caffeine Cache \u2500\u2500
# wash centres rarely change \u2014 cache for 10 min
# vehicles change more often \u2014 cache for 1 min
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=60s

# \u2500\u2500 Swagger \u2500\u2500
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# \u2500\u2500 Logging \u2500\u2500
logging.level.com.carspa=INFO

# \u2500\u2500 Actuator \u2500\u2500
management.endpoints.web.exposure.include=health,info