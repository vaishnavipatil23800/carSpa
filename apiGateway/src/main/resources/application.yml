server:
  port: 8080

spring:
  application:
    name: api-gateway

  # Gateway is reactive — must be set explicitly
  main:
    web-application-type: reactive

  cloud:
    gateway:

      # CORS — allows the React frontend (port 3000) to call the gateway
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      # Routes — each entry maps a URL path to a service
      # lb:// means "load-balanced via Eureka"
      routes:

        # ── User Service ──
        # /api/users/auth/** is PUBLIC (register, login — no JWT needed)
        # Everything else on /api/users/** requires a valid JWT
        - id: user-service-public
          uri: lb://user-service
          predicates:
            - Path=/api/users/auth/**
          # no JwtAuthenticationFilter here — public endpoints

        - id: user-service-protected
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - JwtAuthenticationFilter

        # ── Car Service ──
        - id: car-service
          uri: lb://car-service
          predicates:
            - Path=/api/cars/**
          filters:
            - JwtAuthenticationFilter

        # ── Booking Service ──
        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/bookings/**
          filters:
            - JwtAuthenticationFilter

        # ── Payment Service ──
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - JwtAuthenticationFilter

        # ── Chat Service ──
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**
          filters:
            - JwtAuthenticationFilter

        # Notification service is INTERNAL — not exposed through gateway.
        # It only consumes RabbitMQ events from other services.

# ── Eureka ──
# BUG FIX: gateway was missing trailing slash in defaultZone
# causing inconsistent registration with other services
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# ── JWT ──
# Must be the SAME secret as user-service — gateway validates,
# user-service issues. They must agree on the signing key.
jwt:
  secret: carspa-local-dev-secret-key-min-32-chars-change-in-prod

# ── Logging ──
logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.carspa: DEBUG
    reactor.netty: WARN

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
