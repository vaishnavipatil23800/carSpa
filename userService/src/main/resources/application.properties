# \u2500\u2500 Server \u2500\u2500
spring.application.name=user-service
server.port=8081

# \u2500\u2500 Database \u2500\u2500
# BUG FIX: hardcoded credentials removed \u2014 use env vars in production
spring.datasource.url=jdbc:mysql://localhost:3306/userdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
# BUG FIX: show-sql=true was leaking table structure in logs \u2014 off by default
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# \u2500\u2500 Eureka \u2500\u2500
# BUG FIX: trailing slash added \u2014 was missing vs gateway config (caused inconsistent registration)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# \u2500\u2500 JWT \u2500\u2500
# BUG FIX: secret was hardcoded plain text \u2014 now has a safe local default
# In production, set JWT_SECRET environment variable to a strong 32+ char string
jwt.secret=carspa-local-dev-secret-key-min-32-chars-change-in-prod
jwt.expiration=86400000

# \u2500\u2500 Email \u2500\u2500
# For testing locally, you can leave these blank \u2014 welcome email will just be skipped
# For real emails: set MAIL_USER=yourmail@gmail.com and use a Gmail App Password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# \u2500\u2500 Swagger \u2500\u2500
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# \u2500\u2500 Logging \u2500\u2500
logging.level.com.carspa=INFO
# BUG FIX: was DEBUG \u2014 was leaking token details in logs
logging.level.org.springframework.security=WARN

# \u2500\u2500 Actuator \u2500\u2500
management.endpoints.web.exposure.include=health,info