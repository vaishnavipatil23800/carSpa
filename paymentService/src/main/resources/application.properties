# ── Server ──
spring.application.name=payment-service
server.port=8084

# ── Database ──
spring.datasource.url=jdbc:mysql://localhost:3306/paymentdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Eureka ──
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ── Razorpay ──
# Sign up at https://dashboard.razorpay.com to get test credentials
# Use test mode — no real money is charged
razorpay.key-id=rzp_test_REPLACE_WITH_YOUR_KEY
razorpay.key-secret=REPLACE_WITH_YOUR_SECRET

# ── RabbitMQ ──
# spring.rabbitmq.host=localhost
# spring.rabbitmq.port=5672
# spring.rabbitmq.username=guest
# spring.rabbitmq.password=guest

# ── Email (invoice sender) ──
# Using Gmail SMTP — create an App Password at myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=noreply@carspa.com

# ── GST config (18%) ──
payment.gst-rate=0.18
payment.company-name=CarSpa India Pvt. Ltd.
payment.company-gstin=27AABCC1234D1Z5

# ── Swagger ──
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Logging ──
logging.level.com.carspa=INFO

# ── Actuator ──
management.endpoints.web.exposure.include=health,info

# Disable RabbitMQ if not installed (comment out to enable)
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration