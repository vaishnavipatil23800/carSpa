# ── Server ──
spring.application.name=notification-service
server.port=8085

# ── Eureka ──
# This service has no DB and no REST endpoints — it only consumes RabbitMQ
# but still registers with Eureka so it shows on the dashboard
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ── RabbitMQ ──
# spring.rabbitmq.host=localhost
# spring.rabbitmq.port=5672
# spring.rabbitmq.username=guest
# spring.rabbitmq.password=guest

# ── Queue names — must match what booking-service and payment-service publish to ──
notification.booking-queue=carspa.booking.queue
notification.payment-queue=carspa.payment.queue

# ── Email (Gmail SMTP) ──
# Same credentials as payment-service
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=noreply@carspa.com

# ── Logging ──
logging.level.com.carspa=DEBUG
logging.level.org.springframework.amqp=INFO

# ── Actuator ──
management.endpoints.web.exposure.include=health,info

# Disable RabbitMQ if not installed (comment out to enable)
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration